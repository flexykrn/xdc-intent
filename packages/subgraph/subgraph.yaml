specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: IntentRegistry
    network: apothem
    source:
      address: "0x441f5e07E6FC807E73454B4318ba487e05e65625"
      abi: IntentRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Intent
        - User
        - Solver
        - Token
        - DailyStats
      abis:
        - name: IntentRegistry
          file: ./abis/IntentRegistry.json
      eventHandlers:
        - event: IntentSubmitted(indexed bytes32,indexed address,address,uint256,address,uint256,uint256)
          handler: handleIntentSubmitted
        - event: IntentFulfilled(indexed bytes32,indexed address,uint256,bytes32)
          handler: handleIntentFulfilled
        - event: IntentCancelled(indexed bytes32,indexed address,uint256)
          handler: handleIntentCancelled
      file: ./src/mapping.ts
  - kind: ethereum
    name: Escrow
    network: apothem
    source:
      address: "0x5c6fb5D7E81e11C303e5cE00fBE7AE748a47690d"
      abi: Escrow
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - EscrowLock
        - EscrowRelease
      abis:
        - name: Escrow
          file: ./abis/Escrow.json
      eventHandlers:
        - event: TokensLocked(indexed bytes32,address,uint256,address)
          handler: handleTokensLocked
        - event: TokensReleased(indexed bytes32,address,uint256,address)
          handler: handleTokensReleased
        - event: TokensRefunded(indexed bytes32,address,uint256,address)
          handler: handleTokensRefunded
      file: ./src/mapping.ts
  - kind: ethereum
    name: SolverRegistry
    network: apothem
    source:
      address: "0x4F87a92E3950ec53AFC1776F14Af33c6E9aab360"
      abi: SolverRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Solver
      abis:
        - name: SolverRegistry
          file: ./abis/SolverRegistry.json
      eventHandlers:
        - event: SolverRegistered(indexed uint256,indexed address,string,uint256,uint256[])
          handler: handleSolverRegistered
        - event: SolverDeactivated(indexed uint256,indexed address)
          handler: handleSolverDeactivated
        - event: SolverReactivated(indexed uint256,indexed address)
          handler: handleSolverReactivated
        - event: SupportedChainsUpdated(indexed address,uint256[])
          handler: handleSupportedChainsUpdated
      file: ./src/mapping.ts
